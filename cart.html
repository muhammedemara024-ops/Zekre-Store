<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Zekra Perfumes</title>
    <!-- Use standard project CSS -->
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/all.min.css" />
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/products.css">
    <!-- Removed cart.css to align with products.html -->
</head>

<body>
    <header class="navbar">
        <nav>
            <div class="logo">Zekra Perfumes</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>

            <div class="nav-actions">
                <button class="icon-btn cart-btn" id="cart-btn" aria-label="Open cart">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 6h15l-1.5 9h-11z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <span class="badge" id="cart-count">0</span>
                </button>
                <a href="wishlist.html" class="icon-btn" aria-label="Wishlist">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
                            stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <span class="badge" id="wishlist-count" style="background-color: var(--primary-color);">0</span>
                </a>
                <a href="login.html" class="icon-btn auth-link" aria-label="Login">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H8" stroke="currentColor" stroke-width="1.4"
                            stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M12 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" stroke="currentColor" stroke-width="1.4"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <span class="auth-text">Login</span>
                </a>
            </div>
            <!-- Dark mode toggle removed -->
        </nav>

        <div class="mini-cart" id="mini-cart" aria-hidden="true">
            <div class="mini-cart-header">
                <strong>Your cart</strong>
                <button class="close-mini" id="close-mini">✕</button>
            </div>
            <div class="mini-cart-body" id="mini-cart-body">
                <p class="empty">Your cart is empty.</p>
            </div>
            <div class="mini-cart-footer">
                <button id="clear-cart">Clear cart</button>
                <button id="checkout" onclick="window.location.href='checkout.html'">Checkout</button>
            </div>
        </div>
    </header>

    <div class="container mt-5 pt-5">
        <h1 class="mb-4">Shopping Cart</h1>

        <div class="row">
            <!-- Main Cart Items List -->
            <div class="col-lg-8">
                <div id="cart-items-container" class="d-flex flex-column gap-3">
                    <!-- Items will be injected here by JS -->
                    <div class="p-5 text-center bg-light rounded-3">
                        <p class="mb-0">Loading cart...</p>
                    </div>
                </div>
            </div>

            <!-- Cart Summary -->
            <div class="col-lg-4">
                <!-- Importing checkout.css for this section specifically -->
                <link rel="stylesheet" href="assets/css/checkout.css">
                <style>
                    /* Override some checkout.css specificity issues to make it fit in the col-lg-4 */
                    .summary-card {
                        width: 100%;
                        margin-top: 0;
                        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
                    }
                </style>

                <div class="section-card summary-card sticky-top" style="top: 100px; z-index: 1;">
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="subtotal" style="font-weight: 600;">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span id="summary-shipping" class="free-shipping">FREE</span>
                    </div>
                    <div class="summary-divider"></div>
                    <div class="summary-row total-row">
                        <span>Total</span>
                        <span class="total-amount" id="total-price">$0.00</span>
                    </div>

                    <!-- Checkout Button -->
                    <button class="checkout-btn" id="checkout-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                            <path
                                d="M144 144l0 48 160 0 0-48c0-44.2-35.8-80-80-80s-80 35.8-80 80zM80 192l0-48C80 64.5 144.5 0 224 0s144 64.5 144 144l0 48 16 0c35.3 0 64 28.7 64 64l0 192c0 35.3-28.7 64-64 64L64 512c-35.3 0-64-28.7-64-64L0 256c0-35.3 28.7-64 64-64l16 0z" />
                        </svg>
                        <span>Proceed to Checkout</span>
                    </button>

                    <button id="clear-cart-page" class="btn btn-block w-100 mt-3 text-muted"
                        style="background: none; border: 1px solid #eee;">Clear Cart</button>
                </div>
            </div>
        </div>

        <div class="mt-5 pt-5">
            <h2 class="mb-4">You Might Also Like</h2>
            <!-- Product Grid reused from products.html logic -->
            <div class="row prod" id="product-grid">
                <!-- Products will be loaded here -->
            </div>
        </div>
    </div>

    <footer class="footer"></footer>

    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/common.js"></script>
    <script src="assets/js/script.js"></script>
    <script src="assets/js/cart.js"></script>
</body>

</html>
