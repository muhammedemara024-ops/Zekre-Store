<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist - Zekra Perfumes</title>
    <!-- Removed legacy wishlist.css -->
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/products.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <header class="navbar">
        <nav>
            <div class="logo">Zekra Perfumes</div>
            <ul>
                <!-- Use a static class update if needed, but JS components.js usually handles active state if loaded correctly,
                     though here it is hardcoded. -->
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <!-- ... navbar content ... -->
            <div class="nav-actions">
                <button class="icon-btn cart-btn" id="cart-btn" aria-label="Open cart">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 6h15l-1.5 9h-11z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <span class="badge" id="cart-count">0</span>
                </button>
                <a href="wishlist.html" class="icon-btn" aria-label="Wishlist">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
                            stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <span class="badge" id="wishlist-count" style="background-color: var(--primary-color);">0</span>
                </a>
                <a href="login.html" class="icon-btn auth-link" aria-label="Login">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H8" stroke="currentColor" stroke-width="1.4"
                            stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M12 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" stroke="currentColor" stroke-width="1.4"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <span class="auth-text">Login</span>
                </a>
            </div>
        </nav>

        <div class="mini-cart" id="mini-cart" aria-hidden="true">
            <div class="mini-cart-header">
                <strong>Your cart</strong>
                <button class="close-mini" id="close-mini">✕</button>
            </div>
            <div class="mini-cart-body" id="mini-cart-body">
                <p class="empty">Your cart is empty.</p>
            </div>
            <div class="mini-cart-footer">
                <button id="clear-cart">Clear cart</button>
                <button id="checkout" onclick="window.location.href='checkout.html'">Checkout</button>
            </div>
        </div>
    </header>

    <div class="container mt-5 pt-5" style="min-height: 60vh;">
        <h1 class="mb-4">Your Wishlist</h1>
        <div class="row" id="wishlist-grid">
            <!-- Wishlist items will be loaded here by JS -->
            <p>Your wishlist is loading or empty.</p>
        </div>
    </div>

    <footer class="footer"></footer>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/wishlist.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/about.js"></script>
    <script src="assets/js/common.js"></script>
    <script src="assets/js/script.js"></script>
</body>

</html>
